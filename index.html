<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scan Paket V3</title>
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
:root {
  --primary: #2563eb;
  --dark: #0f172a;
  --bg-body: #f8fafc;
  --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
  
  --keluar-main: #22c55e;
  --keluar-bg: #dcfce7;
  --keluar-text: #166534;
  
  --gagal-main: #f59e0b;
  --gagal-bg: #fef3c7;
  --gagal-text: #92400e;
  
  --gudang-main: #ef4444;
  --gudang-bg: #fee2e2;
  --gudang-text: #991b1b;
}

*{ margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body{ background: var(--bg-body); padding: 15px; color: #334155; max-width: 500px; margin: 0 auto; }
h1{ text-align: center; margin: 10px 0 20px 0; font-size: 22px; font-weight: 800; color: var(--dark); }

.counter{ display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
.counter-box{ background: white; padding: 12px; border-radius: 12px; text-align: center; box-shadow: var(--card-shadow); border: 1px solid #f1f5f9; }
.counter-box h2{ font-size: 26px; font-weight: 800; color: var(--dark); }
.counter-box div{ font-size: 12px; color: #64748b; font-weight: 600; margin-top: 2px; }

.card{ background: white; border-radius: 14px; padding: 14px; margin-bottom: 14px; box-shadow: var(--card-shadow); border: 1px solid #f1f5f9; }
.card h3 { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #475569; text-transform: uppercase; }

.mode-buttons{ display: flex; flex-direction: column; gap: 8px; }
.mode-btn{ border: 2px solid transparent; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: left; opacity: 0.5; color: white; }
.keluar{ background: var(--keluar-main); }
.gagal{ background: var(--gagal-main); }
.gudang{ background: var(--gudang-main); }
.mode-btn.active{ opacity: 1; transform: scale(1.01); }

.status-box{ text-align: center; font-size: 12px; font-weight: 800; padding: 12px; border-radius: 10px; margin-bottom: 14px; box-shadow: var(--card-shadow); }
.status-box span { font-size: 16px; display: block; margin-top: 2px; }
.status-keluar{ background: var(--keluar-bg); color: var(--keluar-text); }
.status-gagal{ background: var(--gagal-bg); color: var(--gagal-text); }
.status-gudang{ background: var(--gudang-bg); color: var(--gudang-text); }

video{ width: 100%; border-radius: 10px; background: black; max-height: 260px; object-fit: cover; margin-bottom: 10px; }
.btn-group { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; }
.btn{ width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-primary{ background: var(--primary); color: white; }
.btn-dark{ background: var(--dark); color: white; }

input{ width: 100%; padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 10px; margin-bottom: 8px; font-size: 14px; outline: none; }

#notif{ position: fixed; top: 15px; left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 470px; z-index: 9999; padding: 14px; border-radius: 10px; font-weight: 700; text-align: center; box-shadow: 0 15px 20px -5px rgb(0 0 0 / 0.1); display: none; }
.success{ background: #10b981; color: white; }
.warning{ background: var(--gagal-main); color: white; }
.error{ background: var(--gudang-main); color: white; }

.history-container { max-height: 240px; overflow-y: auto; }
table{ width: 100%; border-collapse: collapse; }
th,td{ padding: 10px 6px; font-size: 13px; text-align: left; }
th{ background: #f8fafc; color: #64748b; font-weight: 700; position: sticky; top: 0; }
td { border-bottom: 1px solid #f1f5f9; }

.badge{ padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
.badge-keluar{ background: var(--keluar-bg); color: var(--keluar-text); }
.badge-gagal{ background: var(--gagal-bg); color: var(--gagal-text); }
.badge-gudang{ background: var(--gudang-bg); color: var(--gudang-text); }
</style>
</head>

<body>

<h1>SCAN PAKET SRFOOTWEAR</h1>

<div class="counter">
  <div class="counter-box">
    <h2 id="totalScan">0</h2>
    <div>Total Scan</div>
  </div>
  <div class="counter-box">
    <h2 id="totalHari">0</h2>
    <div>Hari Ini</div>
  </div>
</div>

<div class="card">
  <div class="mode-buttons">
    <button id="btnKeluar" class="mode-btn keluar active">Diserahkan ke Ekspedisi</button>
    <button id="btnGagal" class="mode-btn gagal">Pengiriman Gagal</button>
    <button id="btnGudang" class="mode-btn gudang">Diterima di Gudang</button>
  </div>
</div>

<div id="statusMode" class="status-box status-keluar">
  MODE AKTIF: <span id="modeText">DISERAHKAN KE EKSPEDISI</span>
</div>

<div class="card">
  <video id="video"></video>
  <div class="btn-group">
    <button id="startBtn" class="btn btn-primary">Mulai Scan Kamera</button>
    <button id="flashBtn" class="btn btn-dark">Flash</button>
  </div>
</div>

<div class="card">
  <h3>Input Manual Resi</h3>
  <input type="text" id="manualResi" placeholder="Masukkan nomor resi...">
  <button id="manualBtn" class="btn btn-primary">Simpan Resi</button>
</div>

<div id="notif"></div>

<div class="card">
  <h3>Riwayat Terakhir</h3>
  <div class="history-container">
    <table>
      <thead>
        <tr>
          <th>Resi</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>
</div>

<script>
// Menggunakan URL Web App terbaru milikmu
const APP_URL = "https://script.google.com/macros/s/AKfycbxvQtRAV3omIsGe6Gmz2jazy_bx6OK4RoE-4LRBNF1CYrmh1fbV-H9CmLjQ9QBq5EVvQw/exec";

let currentMode = "Diserahkan ke Ekspedisi";
let codeReader = null;
let lastScan = "";
let lastScanTime = 0;
let videoTrack = null;
let isFlashOn = false;

let history = JSON.parse(localStorage.getItem("scanHistory") || "[]");
renderHistory();

document.getElementById("btnKeluar").onclick = () => setMode("Diserahkan ke Ekspedisi");
document.getElementById("btnGagal").onclick = () => setMode("Pengiriman Gagal");
document.getElementById("btnGudang").onclick = () => setMode("Diterima di Gudang");

function setMode(mode){
  currentMode = mode;
  document.querySelectorAll(".mode-btn").forEach(btn => btn.classList.remove("active"));
  const box = document.getElementById("statusMode");
  const txt = document.getElementById("modeText");

  if(mode === "Diserahkan ke Ekspedisi"){
    document.getElementById("btnKeluar").classList.add("active");
    box.className = "status-box status-keluar";
    txt.innerText = "DISERAHKAN KE EKSPEDISI";
  }
  if(mode === "Pengiriman Gagal"){
    document.getElementById("btnGagal").classList.add("active");
    box.className = "status-box status-gagal";
    txt.innerText = "PENGIRIMAN GAGAL";
  }
  if(mode === "Diterima di Gudang"){
    document.getElementById("btnGudang").classList.add("active");
    box.className = "status-box status-gudang";
    txt.innerText = "DITERIMA DI GUDANG";
  }
}

function beep(freq, duration){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.frequency.value = freq;
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e){}
}

function beepSuccess(){ beep(1000, 0.1); }
function beepDuplicate(){ beep(300, 0.5); }
function beepError(){ beep(150, 0.5); }

function showNotif(text, type){
  const n = document.getElementById("notif");
  n.style.display = "block";
  n.className = type === "warning" ? "warning" : (type === "error" ? "error" : "success");
  n.innerHTML = text;
  setTimeout(()=>{ n.style.display="none"; }, 2000);
}

async function startScanner(){
  try{
    if(codeReader) { codeReader.reset(); }
    codeReader = new ZXing.BrowserMultiFormatReader();
    const devices = await codeReader.listVideoInputDevices();
    let backCamera = devices.find(d => /back|rear|environment/i.test(d.label));
    const selected = backCamera ? backCamera.deviceId : devices[0].deviceId;

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: selected, facingMode: "environment" }
    });
    videoTrack = stream.getVideoTracks()[0];
    
    document.getElementById("video").srcObject = stream;

    codeReader.decodeFromVideoDevice(selected, "video", (result)=>{
      if(result){
        const code = result.text.trim();
        // Validasi: Tolak mentah-mentah jika resi kosong/terlalu pendek
        if(!code || code.length < 3) return; 
        
        const now = Date.now();
        // Jeda responsif ditingkatkan (1.5 detik)
        if(code === lastScan && now - lastScanTime < 1500){ return; }
        
        lastScan = code;
        lastScanTime = now;
        saveResi(code);
      }
    });
  }catch(err){
    showNotif("Gagal membuka kamera", "error");
  }
}

document.getElementById("flashBtn").onclick = async () => {
  if (!videoTrack) {
    showNotif("Mulai kamera dahulu!", "warning");
    return;
  }
  try {
    isFlashOn = !isFlashOn;
    await videoTrack.applyConstraints({
      advanced: [{ torch: isFlashOn }]
    });
    document.getElementById("flashBtn").innerText = isFlashOn ? "Matikan Flash" : "Flash";
  } catch (err) {
    showNotif("Flash tidak didukung hardware/browser", "error");
  }
};

document.getElementById("startBtn").onclick = startScanner;

document.getElementById("manualBtn").onclick = ()=>{
  const resi = document.getElementById("manualResi").value.trim();
  if(!resi) return;

  if(resi.toLowerCase() === "clear"){
    if(confirm("Hapus semua riwayat lokal di HP?")){
      history = [];
      localStorage.removeItem("scanHistory");
      renderHistory();
      showNotif("✓ RIWAYAT RESET", "success");
    }
    document.getElementById("manualResi").value="";
    return;
  }

  saveResi(resi);
  document.getElementById("manualResi").value="";
};

async function saveResi(resi){
  try{
    const body = { resi: resi, status: currentMode, keterangan: "" };
    
    const r = await fetch(APP_URL, {
      method: "POST",
      mode: "cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(body)
    });

    const json = await r.json();

    if(json.success){
      beepSuccess();
      
      // Update daftar riwayat lokal di aplikasi HP
      history.unshift({ resi, status: currentMode, time: new Date().toLocaleString("id-ID") });
      localStorage.setItem("scanHistory", JSON.stringify(history.slice(0, 100)));
      renderHistory();
      showNotif("✓ BERHASIL UPDATE<br>" + resi, "success");
    }
    else if(json.duplicate){
      beepDuplicate();
      showNotif("⚠ RESI & STATUS SUDAH SAMA", "warning");
    }
    else{
      beepError();
      showNotif(json.message || "ERROR SERVER", "error");
    }
  }catch(err){
    beepError();
    showNotif("Gagal koneksi internet", "error");
  }
}

function renderHistory(){
  const body = document.getElementById("historyBody");
  body.innerHTML = "";
  let hariIniCount = 0;
  const hariIniStr = new Date().toLocaleDateString("id-ID");

  history.forEach((item, index) => {
    if(item.time && item.time.split(" ")[0] === hariIniStr) {
      hariIniCount++;
    }
    
    if(index < 20) {
      let badge = "badge-keluar";
      if(item.status === "Pengiriman Gagal") badge = "badge-gagal";
      if(item.status === "Diterima di Gudang") badge = "badge-gudang";

      body.innerHTML += `
        <tr>
          <td style="font-weight:600; color:#334155;">${item.resi}</td>
          <td><span class="badge ${badge}">${item.status.replace(" ke Ekspedisi","").replace(" di Gudang","")}</span></td>
        </tr>
      `;
    }
  });
  
  document.getElementById("totalScan").innerText = history.length;
  document.getElementById("totalHari").innerText = hariIniCount;
}
</script>
</body>
</html>
